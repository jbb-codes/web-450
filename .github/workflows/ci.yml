name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apre/apre-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apre/apre-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  client:
    name: Client Build and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apre/apre-client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apre/apre-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless
